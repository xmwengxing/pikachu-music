name: Build Tauri Windows Installer

# 触发：每次 push / PR 到 master；或手动在 Actions 页面 "Run workflow"
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows installer (.msi + NSIS .exe)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        # devDependencies 里有 @tauri-apps/cli@^2.0.0，npm ci 装到 node_modules
        # tauri build 会从本地 .bin/ 调起，不会全局装 v1 的旧 CLI
        run: npm ci

      - name: Build Tauri Windows installer
        # 不用 tauri-apps/tauri-action@v0 那个 action —— 它是给 Tauri 1 写的，
        # 会硬装 @tauri-apps/cli@v1 然后跑 `tauri init --ci`，跟我们 Tauri 2 + 已有项目冲突。
        # 直接调 npx tauri build（用 npm ci 装到 node_modules 的本地 @tauri-apps/cli v2），
        # 不依赖 package.json 里的 tauri:build:win 脚本（master 分支上可能还没那个 script）。
        # beforeBuildCommand 由 tauri build 自己触发（`cd .. && npx expo export --platform web`），
        # MSVC + WebView2 windows-latest runner 都已经预装好。
        run: npx tauri build --bundles nsis,msi
        shell: pwsh

      - name: Verify installer artifacts exist
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse -Include *.exe,*.msi |
            Select-Object FullName, Length

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: pikachu-music-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30
